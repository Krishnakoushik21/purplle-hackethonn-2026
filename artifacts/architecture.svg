<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d18"/>
      <stop offset="1" stop-color="#17142c"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cfc"/>
      <stop offset="1" stop-color="#b56cff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa4c3"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="100" fill="#ffffff" font-family="Arial, sans-serif" font-size="48" font-weight="700">
    Purplle Store Intelligence System
  </text>
  <text x="92" y="145" fill="#9aa4c3" font-family="Arial, sans-serif" font-size="22">
    Raw CCTV footage to real-time offline retail intelligence
  </text>

  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <rect x="90" y="270" width="210" height="170" rx="24" fill="#1f2440" stroke="#4b5688" stroke-width="2"/>
    <text x="195" y="325" fill="#ffffff" text-anchor="middle" font-size="26" font-weight="700">CCTV Clips</text>
    <text x="195" y="365" fill="#b7c0dc" text-anchor="middle" font-size="19">5 observed cameras</text>
    <text x="195" y="397" fill="#b7c0dc" text-anchor="middle" font-size="19">1080p retail footage</text>

    <rect x="390" y="270" width="250" height="170" rx="24" fill="#1f2440" stroke="#7c5cfc" stroke-width="2"/>
    <text x="515" y="325" fill="#ffffff" text-anchor="middle" font-size="26" font-weight="700">Detection Layer</text>
    <text x="515" y="365" fill="#b7c0dc" text-anchor="middle" font-size="19">YOLOv8 person detection</text>
    <text x="515" y="397" fill="#b7c0dc" text-anchor="middle" font-size="19">ByteTrack movement IDs</text>

    <rect x="730" y="270" width="250" height="170" rx="24" fill="#1f2440" stroke="#7c5cfc" stroke-width="2"/>
    <text x="855" y="325" fill="#ffffff" text-anchor="middle" font-size="26" font-weight="700">Event Layer</text>
    <text x="855" y="365" fill="#b7c0dc" text-anchor="middle" font-size="19">Threshold + zone mapping</text>
    <text x="855" y="397" fill="#b7c0dc" text-anchor="middle" font-size="19">Canonical visitor events</text>

    <rect x="1070" y="270" width="210" height="170" rx="24" fill="#1f2440" stroke="#22d3a0" stroke-width="2"/>
    <text x="1175" y="325" fill="#ffffff" text-anchor="middle" font-size="26" font-weight="700">Redis Streams</text>
    <text x="1175" y="365" fill="#b7c0dc" text-anchor="middle" font-size="19">Live event transport</text>
    <text x="1175" y="397" fill="#b7c0dc" text-anchor="middle" font-size="19">JSONL replay support</text>

    <rect x="730" y="570" width="250" height="170" rx="24" fill="#1f2440" stroke="#fbbf24" stroke-width="2"/>
    <text x="855" y="625" fill="#ffffff" text-anchor="middle" font-size="26" font-weight="700">FastAPI</text>
    <text x="855" y="665" fill="#b7c0dc" text-anchor="middle" font-size="19">Idempotent ingestion</text>
    <text x="855" y="697" fill="#b7c0dc" text-anchor="middle" font-size="19">Metrics, funnel, anomalies</text>

    <rect x="390" y="570" width="250" height="170" rx="24" fill="#1f2440" stroke="#fbbf24" stroke-width="2"/>
    <text x="515" y="625" fill="#ffffff" text-anchor="middle" font-size="26" font-weight="700">SQLite Event Store</text>
    <text x="515" y="665" fill="#b7c0dc" text-anchor="middle" font-size="19">event_id primary key</text>
    <text x="515" y="697" fill="#b7c0dc" text-anchor="middle" font-size="19">Session analytics source</text>

    <rect x="1070" y="570" width="210" height="170" rx="24" fill="url(#purple)"/>
    <text x="1175" y="625" fill="#ffffff" text-anchor="middle" font-size="26" font-weight="700">Live Dashboard</text>
    <text x="1175" y="665" fill="#ffffff" text-anchor="middle" font-size="19">WebSocket updates</text>
    <text x="1175" y="697" fill="#ffffff" text-anchor="middle" font-size="19">Operational insights</text>
  </g>

  <g stroke="#9aa4c3" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M 300 355 L 390 355"/>
    <path d="M 640 355 L 730 355"/>
    <path d="M 980 355 L 1070 355"/>
    <path d="M 1175 440 L 1175 570"/>
    <path d="M 1070 655 L 980 655"/>
    <path d="M 730 655 L 640 655"/>
  </g>

  <rect x="90" y="795" width="1190" height="2" fill="#343955"/>
  <text x="90" y="842" fill="#9aa4c3" font-family="Arial, sans-serif" font-size="20">
    North-star metric: converted visitor sessions / unique customer sessions
  </text>
</svg>
